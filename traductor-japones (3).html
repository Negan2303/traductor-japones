<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traductor japonés → español</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .info-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #555; margin-bottom: 1rem; line-height: 1.6; }
  .info-box strong { color: #1a1a1a; }
  .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; margin-bottom: 1rem; font-size: 13px; color: #555; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
  .dot.active { background: #22c55e; animation: pulse 1.5s infinite; }
  .dot.thinking { background: #f59e0b; animation: pulse 0.8s infinite; }
  .dot.error { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .controls { display: flex; gap: 10px; margin-bottom: 1rem; }
  .btn-main { flex: 1; padding: 13px; font-size: 15px; font-weight: 500; border-radius: 10px; border: 1px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; }
  .btn-main:hover { background: #f0f0f0; }
  .btn-main.recording { border-color: #ef4444; color: #ef4444; background: #fff5f5; }
  .btn-clear { padding: 13px 18px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fff; color: #888; cursor: pointer; font-size: 13px; }
  .settings { display: flex; gap: 12px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .settings label { font-size: 13px; color: #555; }
  .settings select { font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; }
  .interim-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #0369a1; margin-bottom: 1rem; display: none; }
  .interim-box.visible { display: block; }
  .translations { display: flex; flex-direction: column; gap: 10px; }
  .entry { padding: 14px 16px; border-radius: 12px; border: 1px solid #e5e5e5; background: #fff; }
  .entry-ja { font-size: 12px; color: #888; margin-bottom: 6px; line-height: 1.6; }
  .entry-es { font-size: 15px; color: #1a1a1a; line-height: 1.65; }
  .entry-time { font-size: 11px; color: #bbb; margin-top: 6px; }
  .loader { display: inline-block; width: 12px; height: 12px; border: 2px solid #ddd; border-top-color: #888; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-left: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 3rem; color: #bbb; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <h1>🇯🇵 → 🇪🇸 Traductor con IA</h1>
  <p class="subtitle">Web Speech API + Gemini IA</p>

  <div class="info-box">
    Asegúrate de que el directo esté sonando en otra pestaña y que <strong>CABLE Output</strong> sea el micrófono predeterminado del sistema.
  </div>

  <div class="settings">
    <label>Mostrar japonés:</label>
    <select id="showja">
      <option value="yes">Sí</option>
      <option value="no">No</option>
    </select>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Listo para iniciar</span>
  </div>

  <div class="controls">
    <button class="btn-main" id="btn-toggle" onclick="toggleRecording()">▶ Iniciar traducción</button>
    <button class="btn-clear" onclick="clearAll()">Limpiar</button>
  </div>

  <div class="interim-box" id="interim-box">
    <span id="interim-text">Escuchando...</span>
  </div>

  <div class="translations" id="translations">
    <div class="empty" id="empty-msg">Las traducciones aparecerán aquí...</div>
  </div>
</div>

<script>
const GEMINI_KEY = 'AIzaSyCYfozAMa0EOgyICogdkV5Ybl_A-YRgP1E';
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY;

let isRecording = false;
let recognition = null;
let pendingText = '';
let translateTimer = null;
let entryCount = 0;

function setStatus(text, state) {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state === 'active' ? ' active' : state === 'thinking' ? ' thinking' : state === 'error' ? ' error' : '');
}

function clearAll() {
  document.getElementById('translations').innerHTML = '<div class="empty" id="empty-msg">Las traducciones aparecerán aquí...</div>';
  entryCount = 0;
  pendingText = '';
}

function toggleRecording() {
  if (isRecording) stopRecording();
  else startSpeech();
}

function startSpeech() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setStatus('Usa Google Chrome.', 'error');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    setStatus('Escuchando japonés...', 'active');
    const btn = document.getElementById('btn-toggle');
    btn.classList.add('recording');
    btn.textContent = '⏹ Detener';
  };

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    if (interim) {
      document.getElementById('interim-box').classList.add('visible');
      document.getElementById('interim-text').textContent = '🎙 ' + interim;
    }
    if (final) {
      document.getElementById('interim-box').classList.remove('visible');
      pendingText += final + ' ';
      clearTimeout(translateTimer);
      translateTimer = setTimeout(() => {
        const txt = pendingText.trim();
        if (txt.length > 1) { pendingText = ''; translateText(txt); }
      }, 1200);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'aborted') return;
    if (e.error === 'not-allowed') { setStatus('Permiso denegado.', 'error'); stopRecording(); return; }
    setStatus('Error: ' + e.error, 'error');
  };

  recognition.onend = () => {
    if (isRecording) setTimeout(() => { try { recognition.start(); } catch(e){} }, 300);
  };

  recognition.start();
}

async function translateText(japaneseText) {
  const showJa = document.getElementById('showja').value === 'yes';
  const id = ++entryCount;
  const emptyMsg = document.getElementById('empty-msg');
  if (emptyMsg) emptyMsg.remove();
  const container = document.getElementById('translations');
  const entry = document.createElement('div');
  entry.className = 'entry';
  entry.id = 'entry-' + id;
  entry.innerHTML = `
    ${showJa ? `<div class="entry-ja">🇯🇵 ${japaneseText}</div>` : ''}
    <div class="entry-es" style="color:#aaa">Traduciendo...<span class="loader"></span></div>
  `;
  container.insertBefore(entry, container.firstChild);
  setStatus('Traduciendo con Gemini...', 'thinking');

  try {
    const response = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [{
            text: 'Eres un intérprete profesional de japonés a español latinoamericano. Traduce el siguiente texto japonés de forma natural y fluida, como lo haría un intérprete humano. Responde SOLO con la traducción al español, sin explicaciones ni comillas:\n\n' + japaneseText
          }]
        }],
        generationConfig: { maxOutputTokens: 500, temperature: 0.3 }
      })
    });

    const data = await response.json();
    const translation = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '(sin traducción)';
    const el = document.getElementById('entry-' + id);
    if (el) {
      const now = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      el.innerHTML = `
        ${showJa ? `<div class="entry-ja">🇯🇵 ${japaneseText}</div>` : ''}
        <div class="entry-es">🇪🇸 ${translation}</div>
        <div class="entry-time">${now}</div>
      `;
    }
    setStatus('Escuchando japonés...', 'active');
  } catch (err) {
    const el = document.getElementById('entry-' + id);
    if (el) el.innerHTML = `<div class="entry-es" style="color:#ef4444">Error al traducir</div>`;
    setStatus('Error de conexión', 'error');
  }
}

function stopRecording() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  clearTimeout(translateTimer);
  document.getElementById('interim-box').classList.remove('visible');
  const btn = document.getElementById('btn-toggle');
  btn.classList.remove('recording');
  btn.textContent = '▶ Iniciar traducción';
  setStatus('Detenido', '');
}
</script>
</body>
</html>
